version: '3.8'

services:
  # Database PostgreSQL
  postgres-db:
    image: postgres:15-alpine
    container_name: turismo-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: turismo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Admin interface (Opcional, para ver la BD)
  pgadmin:
    image: dpage/pgadmin4
    container_name: turismo-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres-db

  # Backend API
  api:
    build: .
    container_name: turismo-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=turismo_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - postgres-db

volumes:
  postgres_data:
